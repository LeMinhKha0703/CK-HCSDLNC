version: '3.8'

services:
  # ==========================================
  # 1. SQL SERVER (Core Data & ACID)
  # ==========================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: elearning_sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_Password_123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - ./DB/SQL:/scripts
    healthcheck:
      # Kiểm tra xem SQL Server đã khởi động xong chưa
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Your_Strong_Password_123", "-C", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Container phụ: Đợi SQL Server khỏe (healthy) rồi tự động chạy file .sql
  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: elearning_sql_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./DB/SQL:/scripts
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      echo "Bat dau chay script khoi tao SQL Server..." &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Your_Strong_Password_123" -C -i /scripts/1_init_schema.sql &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Your_Strong_Password_123" -C -i /scripts/2_seed_data.sql &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Your_Strong_Password_123" -C -i /scripts/3_window_functions.sql &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Your_Strong_Password_123" -C -i /scripts/4_triggers.sql &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Your_Strong_Password_123" -C -i /scripts/5_stored_procedures.sql &&
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Your_Strong_Password_123" -C -i /scripts/6_functions.sql &&
      echo "SQL Server setup completed!"

  # ==========================================
  # 2. MONGODB (Heavy Data & Analytics)
  # ==========================================
  mongodb:
    image: mongo:latest
    container_name: elearning_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ElearningAnalytics
    volumes:
      # MongoDB có sẵn cơ chế tự chạy file .js trong folder này khi khởi tạo lần đầu
      - ./DB/NoSQL/1_init_mongo.js:/docker-entrypoint-initdb.d/1_init_mongo.js


